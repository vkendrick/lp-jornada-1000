  <!-- (restante do head mantido igual até scripts) -->

  <!-- Facebook Pixel (OTIMIZADO: carrega por interação) -->
  <script>
    window._fbq_q = [];
    window.fbq = function() { window._fbq_q.push(arguments); };

    fbq('init', '1848994229133853');
    fbq('track', 'PageView');

    let fbLoaded = false;

    function loadFB() {
      if (fbLoaded) return;
      fbLoaded = true;

      delete window.fbq;
      delete window._fbq;

      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://connect.facebook.net/en_US/fbevents.js';
      s.onload = function() {
        if (window._fbq_q && window._fbq_q.length) {
          window._fbq_q.forEach(function(args) {
            fbq.apply(null, args);
          });
          window._fbq_q = [];
        }
      };
      document.head.appendChild(s);
    }

    window.addEventListener('scroll', loadFB, { once: true });
    window.addEventListener('click', loadFB, { once: true });
  </script>

  <!-- Google Analytics (OTIMIZADO: carrega por interação) -->
  <script>
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}    

    window._gtag_q=[];
    var _gtag_orig=gtag;
    gtag=function(){window._gtag_q.push(arguments);};

    let gaLoaded = false;

    function _loadGtag(){
      var s=document.createElement('script');
      s.async=true;
      s.src='https://www.googletagmanager.com/gtag/js?id=G-7WKFW0D82N';
      s.onload=function(){
        gtag=_gtag_orig;
        gtag('js',new Date());
        gtag('config','G-7WKFW0D82N',{send_page_view:true});
        if(window._gtag_q){window._gtag_q.forEach(function(a){gtag.apply(null,a)});window._gtag_q=[];}
      };
      document.head.appendChild(s);
    }

    function triggerGA() {
      if (gaLoaded) return;
      gaLoaded = true;
      _loadGtag();
    }

    window.addEventListener('scroll', triggerGA, { once: true });
    window.addEventListener('click', triggerGA, { once: true });
  </script>

  <!-- restante do HTML ORIGINAL permanece igual -->
